<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Histórica Interativa</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      overflow: hidden;
    }

    .timeline-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .timeline-header {
      padding: 2rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
      border-bottom: 2px solid #d4af37;
      flex-shrink: 0;
    }

    .timeline-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: #d4af37;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    .timeline-subtitle {
      font-size: 1rem;
      color: #cbd5e1;
      font-weight: 500;
    }

    .timeline-container {
      flex: 1;
      overflow-y: auto;
      padding: 3rem 2rem;
    }

    .timeline-line {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Linha vertical central */
    .timeline-line::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, #d4af37 0%, #94a3b8 50%, #d4af37 100%);
      top: 0;
    }

    .timeline-event {
      margin-bottom: 3rem;
      opacity: 0;
      animation: slideIn 0.6s ease forwards;
    }

    .timeline-event:nth-child(1) { animation-delay: 0.1s; }
    .timeline-event:nth-child(2) { animation-delay: 0.2s; }
    .timeline-event:nth-child(3) { animation-delay: 0.3s; }
    .timeline-event:nth-child(4) { animation-delay: 0.4s; }
    .timeline-event:nth-child(5) { animation-delay: 0.5s; }
    .timeline-event:nth-child(6) { animation-delay: 0.6s; }
    .timeline-event:nth-child(7) { animation-delay: 0.7s; }
    .timeline-event:nth-child(8) { animation-delay: 0.8s; }
    .timeline-event:nth-child(9) { animation-delay: 0.9s; }
    .timeline-event:nth-child(10) { animation-delay: 1s; }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .event-content {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
    }

    .event-content:nth-child(odd) .event-date {
      order: 1;
    }

    .event-content:nth-child(odd) .event-dot {
      order: 2;
    }

    .event-content:nth-child(odd) .event-card {
      order: 3;
    }

    .event-content:nth-child(even) .event-card {
      order: 1;
    }

    .event-content:nth-child(even) .event-dot {
      order: 2;
    }

    .event-content:nth-child(even) .event-date {
      order: 3;
    }

    .event-date {
      width: 25%;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #d4af37;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    .event-dot {
      width: 50%;
      display: flex;
      justify-content: center;
    }

    .dot {
      width: 16px;
      height: 16px;
      background: #d4af37;
      border: 3px solid #0f172a;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
      position: relative;
      z-index: 10;
    }

    .event-card {
      width: 25%;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid #d4af37;
      border-radius: 8px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .event-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
      border-color: #fbbf24;
    }

    .event-card.expanded {
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
    }

    .event-year {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #d4af37;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .event-title {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .event-icon {
      width: 20px;
      height: 20px;
      color: #fbbf24;
    }

    .event-description {
      font-size: 0.85rem;
      color: #cbd5e1;
      line-height: 1.5;
      margin-bottom: 1rem;
      display: none;
    }

    .event-card.expanded .event-description {
      display: block;
    }

    .event-culture {
      font-size: 0.75rem;
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      margin-top: 0.5rem;
      font-weight: 600;
    }

    .egyptian {
      background: rgba(212, 175, 55, 0.2);
      color: #fbbf24;
      border: 1px solid #d4af37;
    }

    .greek {
      background: rgba(148, 163, 184, 0.2);
      color: #cbd5e1;
      border: 1px solid #94a3b8;
    }

    .roman {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid #ef4444;
    }

    .expand-btn {
      background: none;
      border: none;
      color: #d4af37;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
    }

    .expand-btn:hover {
      color: #fbbf24;
      transform: scale(1.2);
    }

    .expand-btn.expanded {
      transform: rotate(180deg);
    }

    /* Scrollbar styling */
    .timeline-container::-webkit-scrollbar {
      width: 8px;
    }

    .timeline-container::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
    }

    .timeline-container::-webkit-scrollbar-thumb {
      background: #d4af37;
      border-radius: 4px;
    }

    .timeline-container::-webkit-scrollbar-thumb:hover {
      background: #fbbf24;
    }

    @media (max-width: 768px) {
      .timeline-line::before {
        left: 20px;
      }

      .event-date, .event-card {
        width: 100%;
      }

      .event-dot {
        position: absolute;
        left: 0;
        width: auto;
      }

      .event-content {
        position: relative;
        padding-left: 50px;
        flex-direction: column;
        align-items: flex-start;
      }

      .event-content:nth-child(odd) .event-date,
      .event-content:nth-child(even) .event-date {
        order: 1;
        margin-bottom: 0.5rem;
      }

      .event-content:nth-child(odd) .event-card,
      .event-content:nth-child(even) .event-card {
        order: 3;
      }

      .dot {
        position: absolute;
        left: 8px;
        top: 8px;
      }

      .timeline-title {
        font-size: 1.8rem;
      }

      .timeline-subtitle {
        font-size: 0.9rem;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="timeline-wrapper">
   <div class="timeline-header">
    <h1 class="timeline-title" id="mainTitle">Civilizações Antigas</h1>
    <p class="timeline-subtitle" id="mainSubtitle">3000 a.C. - 500 d.C. | Egípcios, Gregos e Romanos</p>
   </div>
   <div class="timeline-container">
    <div class="timeline-line" id="timelineEvents"></div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      timeline_title: "Civilizações Antigas",
      subtitle_text: "3000 a.C. - 500 d.C. | Egípcios, Gregos e Romanos"
    };

    let config = { ...defaultConfig };

    const timelineData = [
      {
        id: 1,
        year: "3100 a.C.",
        title: "Unificação do Egito",
        description: "O Faraó Narmer unifica o Alto e Baixo Egito, marcando o início da civilização egípcia dinástica.",
        culture: "egyptian",
        icon: "pyramid"
      },
      {
        id: 2,
        year: "2589 a.C.",
        title: "Grande Pirâmide de Giza",
        description: "Construção da Grande Pirâmide do Faraó Quéops, uma das Sete Maravilhas do Mundo Antigo.",
        culture: "egyptian",
        icon: "landmark"
      },
      {
        id: 3,
        year: "1550 a.C.",
        title: "Império Novo Egípcio",
        description: "Período de ouro do Egito com o Faraó Ahmose fundando a 18ª dinastia e expandindo o império.",
        culture: "egyptian",
        icon: "crown"
      },
      {
        id: 4,
        year: "776 a.C.",
        title: "Primeiros Jogos Olímpicos",
        description: "Primeiras Olimpíadas Antigas são realizadas em Olímpia, Grécia, celebrando os deuses.",
        culture: "greek",
        icon: "medal"
      },
      {
        id: 5,
        year: "461 a.C.",
        title: "Era de Péricles",
        description: "Período dourado de Atenas com o desenvolvimento da democracia grega e construção do Partenão.",
        culture: "greek",
        icon: "building"
      },
      {
        id: 6,
        year: "431 a.C.",
        title: "Guerra do Peloponeso",
        description: "Conflito entre Atenas e Esparta que mudou o rumo da Grécia Antiga.",
        culture: "greek",
        icon: "swords"
      },
      {
        id: 7,
        year: "146 a.C.",
        title: "Domínio Romano sobre Grécia",
        description: "Roma conquista a Grécia e a incorpora ao seu império, absorvendo sua cultura.",
        culture: "roman",
        icon: "sword"
      },
      {
        id: 8,
        year: "27 a.C.",
        title: "Império Romano",
        description: "Otaviano se torna Augusto, primeiro imperador de Roma, iniciando a Pax Romana.",
        culture: "roman",
        icon: "crown"
      },
      {
        id: 9,
        year: "79 d.C.",
        title: "Erupção do Vesúvio",
        description: "Vulcão Vesúvio irrompe, destruindo Pompeia e Herculano, preservando vidas e cultura romana.",
        culture: "roman",
        icon: "zap"
      },
      {
        id: 10,
        year: "476 d.C.",
        title: "Queda do Império Romano",
        description: "Rômulo Augústulo deposto marca o fim oficial do Império Romano do Ocidente.",
        culture: "roman",
        icon: "x"
      }
    ];

    // Renderizar eventos da timeline
    function renderTimeline() {
      const container = document.getElementById('timelineEvents');
      container.innerHTML = timelineData.map((event, index) => `
        <div class="event-content" data-event-id="${event.id}">
          <div class="event-date">${event.year}</div>
          <div class="event-dot">
            <div class="dot"></div>
          </div>
          <div class="event-card" data-expanded="false">
            <div class="event-year">${event.year}</div>
            <div class="event-title">
              <i data-lucide="${event.icon}" class="event-icon"></i>
              ${event.title}
            </div>
            <div class="event-description">${event.description}</div>
            <div class="event-culture ${event.culture}">${event.culture.charAt(0).toUpperCase() + event.culture.slice(1)}</div>
          </div>
        </div>
      `).join('');

      // Adicionar event listeners aos cartões
      document.querySelectorAll('.event-card').forEach(card => {
        card.addEventListener('click', function() {
          const isExpanded = this.dataset.expanded === 'true';
          this.dataset.expanded = !isExpanded;
          this.classList.toggle('expanded');
        });
      });

      lucide.createIcons();
    }

    // Inicializar Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (newConfig) => {
        config = newConfig;
        document.getElementById('mainTitle').textContent = config.timeline_title || defaultConfig.timeline_title;
        document.getElementById('mainSubtitle').textContent = config.subtitle_text || defaultConfig.subtitle_text;
      },
      mapToCapabilities: () => ({
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: () => new Map([
        ['timeline_title', config.timeline_title || defaultConfig.timeline_title],
        ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text]
      ])
    });

    // Renderizar timeline
    renderTimeline();
  </script>
